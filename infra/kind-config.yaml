kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    image: kindest/node:v1.31.6
    extraPortMappings:
      # App (NodePort 30080 → host 80)
      - containerPort: 30080
        hostPort: 80
        protocol: TCP
      # ArgoCD (NodePort 30443 → host 8080)
      - containerPort: 30443
        hostPort: 8080
        protocol: TCP
containerdConfigPatches:
  - |-
    [plugins."io.containerd.grpc.v1.cri".registry.mirrors."localhost:5001"]
      endpoint = ["http://kind-registry:5001"]
