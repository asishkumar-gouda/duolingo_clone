apiVersion: v1
kind: Service
metadata:
  name: {{ include "duolingo-clone.fullname" . }}
  labels:
    {{- include "duolingo-clone.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      nodePort: {{ .Values.service.nodePort }}
      protocol: TCP
      name: http
  selector:
    {{- include "duolingo-clone.selectorLabels" . | nindent 4 }}
